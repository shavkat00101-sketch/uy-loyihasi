<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uy Loyihalari | Professional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f4f4f4; color: #333; }
        nav { background: #2c3e50; padding: 20px; color: white; text-align: center; position: sticky; top: 0; z-index: 100; }
        .hero { height: 60vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1200&q=80'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        .container { padding: 50px 10%; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 10px; overflow: hidden; shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .btn { display: inline-block; padding: 10px 20px; background: #e67e22; color: white; text-decoration: none; border-radius: 5px; margin-top: 10px; }
        footer { background: #2c3e50; color: white; text-align: center; padding: 20px; margin-top: 50px; }
    </style>
</head>
<body>
    <nav><h1>URBAN ARCHITECT</h1></nav>
    <div class="hero">
        <h2>Zamonaviy Uy Loyihalari</h2>
        <p>Sizning orzungizdagi uy biz bilan boshlanadi</p>
    </div>
    <div class="container">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=500" alt="Villa">
            <div class="card-body">
                <h3>Modern Villa</h3>
                <p>250 m² | 5 xona</p>
                <a href="tel:+998901234567" class="btn">Bog'lanish</a>
            </div>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1518780664697-55e3ad937233?w=500" alt="Eco">
            <div class="card-body">
                <h3>Eco House</h3>
                <p>180 m² | 3 xona</p>
                <a href="tel:+998901234567" class="btn">Bog'lanish</a>
            </div>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=500" alt="Classic">
            <div class="card-body">
                <h3>Classic Mansion</h3>
                <p>400 m² | 7 xona</p>
                <a href="tel:+998901234567" class="btn">Bog'lanish</a>
            </div>
